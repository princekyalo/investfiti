<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:380px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:25px;
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

input{
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

input:invalid{
border-color:#ef4444;
}

input:valid{
border-color:#22c55e;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1e40af;
}

.error{
color:red;
font-size:14px;
text-align:center;
}

.footer{
margin-top:10px;
text-align:center;
font-size:14px;
}

.footer a{
color:#2563eb;
text-decoration:none;
}

.footer a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<div id="formError" class="error"></div>

<form id="loginForm">

<input
id="loginInput"
type="text"
placeholder="Email / Payment Address / Phone Number"
required
/>

<input
id="password"
type="password"
placeholder="Password"
required
minlength="6"
/>

<button type="submit">Login</button>

</form>

<div class="footer">
Don't have an account? <a href="signup.html">Sign Up</a>
</div>

</div>

<script type="module" src="scripts/firebase_login.js"></script>

</body>

</html>
