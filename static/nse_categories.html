  function store_login_cookies() {
    const COOKIE_NAME = "lastLogin";
    const REDIRECT_PAGE = "auth.html";
    const SEVEN_DAYS_MS = 7 * 24 * 60 * 60 * 1000;

    function getCookie(name) {
        const cookies = document.cookie.split("; ");
        for (let cookie of cookies) {
            const [key, value] = cookie.split("=");
            if (key === name) {
                return decodeURIComponent(value);
            }
        }
        return null;
    }

    function setCookie(name, value, days) {
        const date = new Date();
        date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
        const expires = "expires=" + date.toUTCString();
        document.cookie = `${name}=${encodeURIComponent(value)}; ${expires}; path=/`;
    }

    const existingLogin = getCookie(COOKIE_NAME);

    if (existingLogin) {
        const lastLoginDate = new Date(existingLogin);
        const now = new Date();

        if (now - lastLoginDate > SEVEN_DAYS_MS) {
            window.location.href = "auth.html";
            return;
        }
    }

    // Update cookie with today's date
    setCookie(COOKIE_NAME, new Date().toISOString(), 7);
}

// Run automatically when page loads
window.addEventListener("load", store_login_cookies);

/* ----------------------------
   RENDER SECTOR TABLES
---------------------------- */

const container = document.getElementById("sectorContainer");

data.categories.forEach(category => {

    const card = document.createElement("div");
    card.className = "sector-card";

    card.innerHTML = `
        <div class="sector-title">${category.sector}</div>
        <table>
            <thead>
                <tr>
                    <th>Sector</th>
                    <th>Company</th>
                </tr>
            </thead>
            <tbody>
                ${category.companies.map(company => `
                    <tr>
                        <td>${category.sector}</td>
                        <td>${company}</td>
                    </tr>
                `).join("")}
            </tbody>
        </table>
        <button onclick="showDescription('${category.sector}')">Description</button>
    `;

    container.appendChild(card);
});
