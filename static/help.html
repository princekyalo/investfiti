<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Help Center</title>

<style>

:root{
--bg:#0f172a;
--panel:#1e293b;
--border:#334155;
--text:#e2e8f0;
--muted:#94a3b8;
--accent:#38bdf8;
--green:#34d399;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI,Roboto,Arial;
background:linear-gradient(135deg,#020617,#0f172a);
color:var(--text);
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#020617;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-weight:700;
font-size:18px;
color:var(--accent);
}

.nav-links a{
margin-left:25px;
text-decoration:none;
color:var(--text);
font-size:14px;
padding:6px 10px;
border-radius:6px;
transition:0.3s;
}

.nav-links a:hover{
background:rgba(56,189,248,0.15);
color:var(--accent);
}

.nav-links a.active{
background:rgba(56,189,248,0.25);
color:var(--accent);
}

/* HEADER */

.header{
text-align:center;
padding:40px 20px;
}

.header h1{
font-size:32px;
margin-bottom:10px;
}

.header p{
color:var(--muted);
}

/* VIDEO GRID */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

/* VIDEO CARD */

.video-card{
background:var(--panel);
border-radius:12px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
transition:0.25s;
}

.video-card:hover{
transform:translateY(-5px);
}

.video-title{
font-weight:600;
margin-bottom:5px;
}

.video-creator{
font-size:13px;
color:var(--green);
margin-bottom:10px;
}

.video-desc{
font-size:13px;
color:var(--muted);
margin-bottom:12px;
}

iframe{
width:100%;
height:420px;
border:none;
border-radius:10px;
}

.fallback{
display:block;
margin-top:10px;
font-size:13px;
color:var(--accent);
text-decoration:none;
}

.fallback:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">FINANCE HUB</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="news.html">News</a>
<a href="auth.html">Login / Sign Up</a>
<a href="help.html" class="active">Help</a>
</div>

</div>

<!-- HEADER -->

<div class="header">
<h1>Help & Learning Center</h1>
<p>Short videos explaining investing, markets, and trading</p>
</div>

<!-- VIDEO GRID -->

<div class="container">
<div class="video-grid" id="videoGrid"></div>
</div>

<script>

/* ===============================
VIDEO DATA (JSON CONTROLLED)
=============================== */

const videoData = {

videos:[

{
title:"Stock Market Basics",
creator:"@financeacademy",
desc:"Simple explanation of how the stock market works.",
embed:"https://www.tiktok.com/embed/v2/726000000000000001",
url:"https://www.tiktok.com/"
},

{
title:"What is Diversification?",
creator:"@investingtips",
desc:"Why you should never put all your money in one stock.",
embed:"https://www.tiktok.com/embed/v2/726000000000000002",
url:"https://www.tiktok.com/"
},

{
title:"Understanding PE Ratio",
creator:"@marketmentor",
desc:"How analysts value companies using P/E ratios.",
embed:"https://www.tiktok.com/embed/v2/726000000000000003",
url:"https://www.tiktok.com/"
},

{
title:"Long Term Investing",
creator:"@wealthbuilder",
desc:"Why patience is the most powerful investing strategy.",
embed:"https://www.tiktok.com/embed/v2/726000000000000004",
url:"https://www.tiktok.com/"
},

{
title:"ETF Investing Guide",
creator:"@financialfreedom",
desc:"How ETFs allow diversification with a single investment.",
embed:"https://www.tiktok.com/embed/v2/726000000000000005",
url:"https://www.tiktok.com/"
},

{
title:"Understanding Risk",
creator:"@tradingschool",
desc:"Risk management strategies used by professionals.",
embed:"https://www.tiktok.com/embed/v2/726000000000000006",
url:"https://www.tiktok.com/"
},

{
title:"Bull vs Bear Markets",
creator:"@marketexplained",
desc:"Recognizing the difference between bullish and bearish markets.",
embed:"https://www.tiktok.com/embed/v2/726000000000000007",
url:"https://www.tiktok.com/"
},

{
title:"Compound Interest Power",
creator:"@investsmart",
desc:"How compound interest grows wealth over time.",
embed:"https://www.tiktok.com/embed/v2/726000000000000008",
url:"https://www.tiktok.com/"
},

{
title:"Beginner Portfolio Strategy",
creator:"@financetips",
desc:"A simple asset allocation strategy for beginners.",
embed:"https://www.tiktok.com/embed/v2/726000000000000009",
url:"https://www.tiktok.com/"
},

{
title:"Economic Indicators Explained",
creator:"@macroinsights",
desc:"How GDP, inflation and interest rates affect markets.",
embed:"https://www.tiktok.com/embed/v2/726000000000000010",
url:"https://www.tiktok.com/"
}

]

};

/* ===============================
GENERATE VIDEO CARDS
=============================== */

const grid = document.getElementById("videoGrid");

videoData.videos.forEach(video => {

const card = document.createElement("div");
card.className = "video-card";

card.innerHTML = `

<div class="video-title">${video.title}</div>
<div class="video-creator">${video.creator}</div>
<div class="video-desc">${video.desc}</div>

<iframe src="${video.embed}" allowfullscreen></iframe>

<a class="fallback" href="${video.url}" target="_blank">
Open on TikTok if video fails to load
</a>

`;

grid.appendChild(card);

});

</script>

</body>
</html>
